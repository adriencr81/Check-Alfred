name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q --cov=alfred --cov-report=term
      - run: ruff check .
      - run: ruff format --check .
      # python -m: always the env's mypy, whole config (src + tests, strict).
      - run: python -m mypy
