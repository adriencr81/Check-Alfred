repos:
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python3 -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff
        name: ruff check
        entry: python3 -m ruff check .
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy --strict
        entry: python3 -m mypy --strict src/
        language: system
        pass_filenames: false
        always_run: true
