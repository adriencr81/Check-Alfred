# Declarative mandate for the refund-bot-v3 agent (PLAN.md §5, Brique 2).
#
# Each field is read by `alfred.mandate.load_mandate`, then checked against
# a trace of events by `alfred.mandate.evaluate`, which produces a typed
# list of Deviations — each anchored to at least one event_id in the trace.

# Name of the supervised agent — must match the `gen_ai.agent.name`
# attribute carried by the trace's agent_task spans.
agent: refund-bot-v3

# Tools the agent is allowed to call. Any tool_call (gen_ai.tool.name)
# missing from this list raises a `tool_not_allowed` deviation.
allowed_tools:
  - read_order
  - issue_refund
  - notify_customer

# Daily budget in euros for this agent, computed by summing the
# gen_ai.usage.cost_eur attribute over every event in the trace.
# Exceeding it raises a `budget_exceeded` deviation.
daily_budget_eur: 5.00

# Forbidden actions. Two forms are supported:
#   - an exact tool name (e.g. `send_marketing`): any call to that tool
#     is a `forbidden_action` deviation.
#   - a `<tool>_above_<threshold>_eur` pattern (e.g.
#     `issue_refund_above_100_eur`): deviation if the tool is called with
#     a `tool.arguments.amount_eur` attribute strictly above the threshold.
forbidden_actions:
  - issue_refund_above_100_eur
  - send_marketing

# Conditions that must trigger an escalation by the agent (an event
# carrying the `alfred.escalated=true` attribute). If the metric exceeds
# the threshold and no escalation is present in the trace, an
# `escalation_missed` deviation is raised.
#   - tool_error_rate: share of tool calls that errored
#     (tool.result.status != "ok") among all tool calls.
#   - budget_used: trace cost / daily_budget_eur.
escalate_when:
  - tool_error_rate > 0.10
  - budget_used > 0.80

# A run of this many identical consecutive tool calls (same tool + same
# arguments) raises a `loop_detected` deviation — an agent spinning without
# progress. Optional; defaults to 3 when omitted.
loop_threshold: 3

# Conditional obligations. If `when_tool` is called in a trace but
# `require_tool` never is, a `required_action_missing` deviation is raised,
# anchored to the `when_tool` event(s). Catches the silent failure of an
# action taken without its mandatory follow-up — here, a refund issued
# without ever notifying the customer.
required_actions:
  - when_tool: issue_refund
    require_tool: notify_customer
